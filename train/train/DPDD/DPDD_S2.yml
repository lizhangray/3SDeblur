name: DPDD_Stage2
model_type: ImageRestorationDFDModel
scale: 1
num_gpu: 8
manual_seed: 42

datasets:
  train:
    name: DPDD-train
    type: PairedImageDataset
    dataroot_gt: /mnt/sda1/shallowdream/Restormer/Defocus_Deblurring/Datasets/train/DPDD/target_crops
    dataroot_lq: /mnt/sda1/shallowdream/Restormer/Defocus_Deblurring/Datasets/train/DPDD/inputC_crops
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 256
    use_flip: true
    use_rot: true

    num_worker_per_gpu: 4
    batch_size_per_gpu: 64
    accumulation_step: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
    phase: train
    scale: 1


  val:
    name: DPDD-test
    type: PairedImageDataset
    dataroot_gt: /mnt/sda1/shallowdream/dataset/dd_dp_dataset_png/test_c/target
    dataroot_lq: /mnt/sda1/shallowdream/dataset/dd_dp_dataset_png/test_c/source
    io_backend:
      type: disk

network_g:
  type: DFD


# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 1e-3
    weight_decay: !!float 1e-3
    betas: [0.9, 0.9]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 100000
    eta_min: !!float 1e-7

  total_iter: 100000
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: PSNRLoss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  val_freq: !!float 2e4
  save_img: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
