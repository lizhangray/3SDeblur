# general settings
name: DPDD-test
model_type: ImageRestorationTestModel
scale: 1
num_gpu: 8 # set num_gpu: 0 for cpu mode
manual_seed: 42

# dataset and data loader settings
datasets:
  test:
    name: DPDD-test
    type: PairedImageDataset

    dataroot_gt: /mnt/sda1/shallowdream/dataset/dd_dp_dataset_png/test_c/target
    dataroot_lq: /mnt/sda1/shallowdream/dataset/dd_dp_dataset_png/test_c/source
    batch_size_per_gpu: 1
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: NAFNetLocalS3
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

network_g_S2:
  type: DFD

# path
path:
  pretrain_network_g_S2: pretrain_model/DPDD_Stage2.pth
  pretrain_network_g_S3: pretrain_model/DPDD_Stage3.pth
  strict_load_g: False
  resume_state: ~
  ignore_resume_networks: ~

# validation settings
val:
  save_img: true
  grids: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0

# dist training settings
dist_params:
  backend: nccl
  port: 29500
