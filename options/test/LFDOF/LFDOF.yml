# general settings
name: Ablation_NAFNet-LFDOF
model_type: ImageRestorationTestModel
scale: 1
num_gpu: 8 # set num_gpu: 0 for cpu mode
manual_seed: 42

# dataset and data loader settings
datasets:
  test:
    name: LFDOF-test
    type: PairedImageDataset

#    dataroot_gt: /mnt/sda1/shallowdream/dataset/LFDOF/test_data/ground_truth
#    dataroot_lq: /mnt/sda1/shallowdream/dataset/LFDOF/test_data/input
    dataroot_gt: /mnt/sda1/shallowdream/dataset/dd_dp_dataset_png/test_c/target/
    dataroot_lq: /mnt/sda1/shallowdream/dataset/dd_dp_dataset_png/test_c/source/

    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: NAFNetLocalJoint
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

network_cpen:
  type: LTR

# path
path:
  pretrain_network_g: pretrain_model/net_g_latest.pth
  pretrain_network_cpen: pretrain_model/net_cpen_latest.pth
  strict_load_g: False
  ignore_resume_networks: network_cpen

# validation settings
val:
  save_img: true
  grids: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# dist training settings
dist_params:
  backend: nccl
  port: 29500
