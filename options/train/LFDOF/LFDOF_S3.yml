# general settings
name: LFDOF_Stage3
model_type: ImageRestorationS3Model
scale: 1
num_gpu: 8
manual_seed: 42

datasets:
  train:
    name: LFDOF-train
    type: PairedImageDataset
    dataroot_gt: /mnt/sda1/shallowdream/dataset/LFDOF/train_data/ground_truth
    dataroot_lq: /mnt/sda1/shallowdream/dataset/LFDOF/train_data/input

    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 256
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 1
    batch_size_per_gpu: 64
    accumulation_step: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: LFDOF-test
    type: PairedImageDataset
    dataroot_gt: /mnt/sda1/shallowdream/dataset/LFDOF/test_data/ground_truth
    dataroot_lq: /mnt/sda1/shallowdream/dataset/LFDOF/test_data/input
    io_backend:
      type: disk

network_g_S1:
  type: NAFNetLocalS1
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

network_g_S2:
  type: DFD

network_g_S3:
  type: NAFNetLocalS3
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]

# path
path:
  pretrain_network_g_S1: ~
  pretrain_network_g_S2: ~
  pretrain_network_g_S3: ~
  strict_load_g: true
  resume_state: ~
  ignore_resume_networks: network_g_S1

train:
  optim_g:
    type: AdamW
    lr: !!float 1e-3
    weight_decay: !!float 1e-3
    betas: [0.9, 0.9]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 120000
    eta_min: !!float 1e-6

  total_iter: 120000
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: PSNRLoss
    loss_weight: 1
    reduction: mean

  kd_loss_opt:
    type: KDLoss
    loss_weight: 0.05
    temperature: 0.15

# validation settings
val:
  val_freq: !!float 1e4
  save_img: true


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: calculate_lpips
      crop_border: 0

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
